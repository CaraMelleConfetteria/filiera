<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #ff7700;
      --text: #1a1a1a;
      --muted: #888;
      --border: #e8e8e8;
      --bg: #fff;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 32px 24px 24px;
      text-align: center;
      
    }

    .brand-logo {
      margin-bottom: 8px;
      display: flex;
      justify-content: center;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    header h1 span {
      color: var(--orange);
    }

    header p {
      margin-top: 9px;
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.6;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    header p .first-line {
      display: block;
      font-weight: 300;
      font-style: italic;
      margin-bottom: 10px;
    }

    /* ── SECTION ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 32px 24px 12px;
    }

    /* ── FORNITORE CARD ── */
    .suppliers {
      list-style: none;
      padding: 0 16px;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .supplier-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.15s;
      background: #fff;
    }

    .supplier-card:hover {
      border-color: var(--orange);
      transform: translateY(-1px);
    }

    .supplier-card:active {
      transform: translateY(0);
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-product {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-tag {
      font-size: 11px;
      font-weight: 600;
      background: #fff3e6;
      color: var(--orange);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── ARROW ── */
    .card-arrow {
      font-size: 18px;
      color: #ccc;
      flex-shrink: 0;
      margin-left: 4px;
      transition: color 0.2s;
    }

    .supplier-card:hover .card-arrow {
      color: var(--orange);
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 48px;
      text-align: center;
      font-size: 12px;
      color: #bbb;
      font-weight: 400;
    }

    footer a {
      color: var(--orange);
      text-decoration: none;
    }
  </style>
</head>
