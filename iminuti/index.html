<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stefano Marchisio — imiNUTi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brown: #2C1A0E;
      --brown-light: #5C3D2E;
      --gold: #B8893A;
      --gold-light: #D4A853;
      --gray: #8A7A6E;
      --border: #EBEBEB;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      position: relative;
    }

    .card {
      background: #ffffff;
      border-radius: 0;
      max-width: 400px;
      width: 100%;
      border: 1px solid var(--border);
      overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      display: block;
      height: 3px;
      background: #ff7700;
    }

    .card-header {
      padding: 20px 28px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .logo-wrap {
      width: 96px;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ff7700;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Raleway', sans-serif;
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--brown);
      line-height: 1.15;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .company {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--brown-light);
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    .product-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      font-weight: 600;
    }

    .card-body {
      padding: 20px 40px;
      display: flex;
      flex-direction: column;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .contact-item:last-child { border-bottom: none; }
    .contact-item:hover .contact-label { color: #ff7700; }
    .contact-item:hover .icon { color: #ff7700; }

    .icon {
      width: 18px;
      color: #CCCCCC;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .contact-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #CCCCCC;
      display: block;
      margin-bottom: 3px;
      transition: color 0.2s;
    }

    .contact-value {
      font-size: 0.88rem;
      color: var(--brown);
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .btn-save {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--brown);
      color: #ffffff;
      border: none;
      border-radius: 999px;
      padding: 14px 32px;
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease;
    }

    .btn-save:hover { background: #ff7700; }

    
  </style>
</head>
